<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabo Sphere - Menu & Order</title>
    <style>
        /* --- CSS VARIABLES (Theming) --- */
        :root {
            --bg-color: #FFFBF4; /* Soft Cream */
            --primary: #006D77; /* Deep Teal */
            --primary-light: #83C5BE;
            --text-main: #2b2d42;
            --text-muted: #6c757d;
            --card-bg: #FFFFFF;
            --danger: #e63946;
            --success: #2a9d8f;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --border-radius: 16px;
            --transition: all 0.3s ease;
        }

        /* --- GLOBAL STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding-bottom: 80px; }
        h1, h2, h3 { color: var(--primary); }
        button { cursor: pointer; border: none; outline: none; transition: var(--transition); font-weight: 600; }
        .hidden { display: none !important; }

        /* --- LAYOUT --- */
        header { background: var(--card-bg); padding: 20px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .header-info h1 { font-size: 1.5rem; margin-bottom: 4px; }
        .header-info p { font-size: 0.85rem; color: var(--success); font-weight: 600; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr; gap: 30px; }
        
        @media (min-width: 900px) {
            .container { grid-template-columns: 2fr 1fr; } /* Desktop: Menu left, Cart right */
            body { padding-bottom: 0; }
        }

        /* --- CARDS & UI ELEMENTS --- */
        .card { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
        
        /* Hero Section */
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .hero-card { display: flex; flex-direction: column; text-align: center; border: 2px solid transparent; }
        .hero-card:hover { border-color: var(--primary-light); transform: translateY(-3px); }
        .hero-icon { font-size: 3rem; margin-bottom: 10px; }
        
        /* Categories */
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin: 20px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--card-bg); color: var(--text-muted); padding: 10px 20px; border-radius: 30px; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Menu Items */
        .menu-list { display: flex; flex-direction: column; gap: 15px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #eee; border-radius: 12px; background: var(--card-bg); }
        .menu-info h4 { font-size: 1.1rem; margin-bottom: 5px; }
        .menu-info p { font-size: 0.85rem; color: var(--text-muted); max-width: 250px; }
        .price { font-weight: 700; color: var(--primary); font-size: 1.1rem; display: block; margin-top: 5px; }
        .add-btn { background: var(--primary-light); color: var(--text-main); padding: 8px 16px; border-radius: 8px; }
        .add-btn:hover { background: var(--primary); color: white; }

        /* --- CART & CHECKOUT --- */
        .cart-wrapper { position: relative; }
        .cart-section { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: var(--shadow); position: sticky; top: 100px; }
        .cart-items { max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #eee; }
        .cart-item-title { font-weight: 600; font-size: 0.9rem; }
        .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .qty-btn { background: #f1f3f5; color: var(--text-main); width: 28px; height: 28px; border-radius: 6px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .qty-btn:hover { background: #e2e6ea; }
        
        .totals { border-top: 2px solid #f1f3f5; padding-top: 15px; margin-bottom: 20px; }
        .total-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem; color: var(--primary); }

        /* Forms & Radios */
        .form-group { margin-bottom: 15px; }
        .form-label { font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; display: block; }
        .radio-group { display: flex; gap: 10px; }
        .radio-label { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; transition: var(--transition); font-size: 0.9rem; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-label { border-color: var(--primary); background: rgba(0, 109, 119, 0.05); color: var(--primary); font-weight: 700; }
        input[type="radio"]:disabled + .radio-label { opacity: 0.5; cursor: not-allowed; text-decoration: line-through; }

        .checkout-btn { width: 100%; background: var(--primary); color: white; padding: 15px; border-radius: 8px; font-size: 1.1rem; margin-top: 10px; }
        .checkout-btn:hover { background: #005058; }
        .checkout-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* --- SUCCESS SCREEN --- */
        .success-screen { text-align: center; padding: 40px 20px; }
        .success-icon { font-size: 4rem; margin-bottom: 20px; }
        .order-status-card { background: var(--card-bg); padding: 30px; border-radius: var(--border-radius); box-shadow: var(--shadow); max-width: 500px; margin: 0 auto; }
        .status-badge { display: inline-block; padding: 8px 16px; background: rgba(42, 157, 143, 0.1); color: var(--success); border-radius: 30px; font-weight: 700; margin: 15px 0; }
    </style>
</head>
<body>

    <header>
        <div class="header-info">
            <h1>Cabo Sphere</h1>
            <p>● Taking Orders Live</p>
        </div>
        <div class="table-badge" id="table-display">
            <strong>Table 04</strong>
        </div>
    </header>

    <div class="container" id="main-app">
        
        <main class="menu-wrapper">
            
            <section class="card">
                <h2>Today's Specials</h2>
                <div class="hero-grid" id="hero-container">
                    </div>
            </section>

            <section class="menu-section">
                <h2>Full Menu</h2>
                <div class="tabs" id="category-tabs">
                    </div>
                
                <div class="menu-list" id="menu-container">
                    </div>
            </section>
        </main>

        <aside class="cart-wrapper">
            <div class="cart-section">
                <h2>Your Order</h2>
                
                <div class="cart-items" id="cart-items">
                    <p style="color: var(--text-muted); text-align: center; padding: 20px;">Your cart is empty.</p>
                </div>

                <div class="totals">
                    <div class="total-row">
                        <span>Total</span>
                        <span id="cart-total">₹0</span>
                    </div>
                </div>

                <div class="checkout-form">
                    <div class="form-group">
                        <span class="form-label">Order Type</span>
                        <div class="radio-group">
                            <input type="radio" name="orderType" id="dine-in" value="Dine-In" checked onchange="handleOrderTypeChange()">
                            <label for="dine-in" class="radio-label">Dine-In</label>
                            
                            <input type="radio" name="orderType" id="takeaway" value="Takeaway" onchange="handleOrderTypeChange()">
                            <label for="takeaway" class="radio-label">Takeaway</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <span class="form-label">Payment Method</span>
                        <div class="radio-group">
                            <input type="radio" name="paymentMethod" id="pay-online" value="Online" checked>
                            <label for="pay-online" class="radio-label">Pay Now (UPI)</label>
                            
                            <input type="radio" name="paymentMethod" id="pay-cash" value="Cash">
                            <label for="pay-cash" class="radio-label" id="cash-label">Pay Cash</label>
                        </div>
                    </div>

                    <button class="checkout-btn" id="checkout-btn" onclick="placeOrder()" disabled>Place Order (₹0)</button>
                </div>
            </div>
        </aside>

    </div>

    <div class="container hidden" id="success-screen">
        <div class="order-status-card">
            <div class="success-icon">✅</div>
            <h2>Order Placed!</h2>
            <p>Your order has been sent to the kitchen.</p>
            
            <div class="status-badge" id="live-status">Status: Paid & In Queue</div>
            
            <div style="text-align: left; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                <p><strong>Order ID:</strong> #CS-9021</p>
                <p><strong>Type:</strong> <span id="receipt-type"></span></p>
                <p><strong>Total:</strong> <span id="receipt-total"></span></p>
            </div>
            
            <button class="checkout-btn" style="margin-top: 30px;" onclick="location.reload()">Start New Order</button>
        </div>
    </div>

    <script>
        // 1. Data Structure (Simulating a Database)
        const menuData = [
            { id: 1, name: 'Spicy Sriracha Tacos', category: 'Starters', price: 450, desc: 'Soft corn tortillas, charred chicken, sriracha aioli.', isHero: true, icon: '🌮' },
            { id: 2, name: 'Truffle Burrata Pasta', category: 'Mains', price: 620, desc: 'Truffle oil infused pasta with whole Italian burrata.', isHero: true, icon: '🍝' },
            { id: 3, name: 'Loaded Nachos', category: 'Starters', price: 380, desc: 'Crispy corn chips, melted cheese, jalapenos, sour cream.', isHero: false, icon: '🧀' },
            { id: 4, name: 'Classic Margherita', category: 'Mains', price: 550, desc: 'Sourdough, San Marzano tomatoes, fresh mozzarella.', isHero: false, icon: '🍕' },
            { id: 5, name: 'Mushroom Risotto', category: 'Mains', price: 580, desc: 'Creamy arborio rice with wild mushrooms and parmesan.', isHero: false, icon: '🍲' },
            { id: 6, name: 'Classic Tiramisu', category: 'Desserts', price: 350, desc: 'Coffee-soaked ladyfingers, rich mascarpone cream.', isHero: false, icon: '🍰' },
            { id: 7, name: 'Virgin Mojito', category: 'Beverages', price: 250, desc: 'Fresh mint, lime, sugar syrup, club soda.', isHero: false, icon: '🍹' },
            { id: 8, name: 'Cold Coffee', category: 'Beverages', price: 220, desc: 'Thick blended iced coffee with vanilla ice cream.', isHero: false, icon: '🧋' }
        ];

        // 2. Application State
        let cart = {};
        let activeCategory = 'Mains';
        const categories = ['Starters', 'Mains', 'Desserts', 'Beverages'];

        // 3. Initialization
        window.onload = () => {
            renderHeroDishes();
            renderTabs();
            renderMenu(activeCategory);
        };

        // 4. Render Functions
        function renderHeroDishes() {
            const container = document.getElementById('hero-container');
            const heroes = menuData.filter(item => item.isHero);
            
            container.innerHTML = heroes.map(item => `
                <div class="card hero-card">
                    <div class="hero-icon">${item.icon}</div>
                    <h3>${item.name}</h3>
                    <p class="price">₹${item.price}</p>
                    <button class="add-btn" style="margin-top: 15px;" onclick="addToCart(${item.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        function renderTabs() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = categories.map(cat => `
                <button class="tab-btn ${cat === activeCategory ? 'active' : ''}" onclick="switchCategory('${cat}')">
                    ${cat}
                </button>
            `).join('');
        }

        function switchCategory(category) {
            activeCategory = category;
            renderTabs();
            renderMenu(category);
        }

        function renderMenu(category) {
            const container = document.getElementById('menu-container');
            const items = menuData.filter(item => item.category === category);
            
            container.innerHTML = items.map(item => `
                <div class="menu-item">
                    <div class="menu-info">
                        <h4>${item.icon} ${item.name}</h4>
                        <p>${item.desc}</p>
                        <span class="price">₹${item.price}</span>
                    </div>
                    <button class="add-btn" onclick="addToCart(${item.id})">Add</button>
                </div>
            `).join('');
        }

        // 5. Cart Logic
        function addToCart(itemId) {
            if (cart[itemId]) {
                cart[itemId].qty += 1;
            } else {
                const item = menuData.find(i => i.id === itemId);
                cart[itemId] = { ...item, qty: 1 };
            }
            updateCartUI();
        }

        function updateQty(itemId, change) {
            if (cart[itemId]) {
                cart[itemId].qty += change;
                if (cart[itemId].qty <= 0) {
                    delete cart[itemId];
                }
                updateCartUI();
            }
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const btn = document.getElementById('checkout-btn');
            
            const cartArray = Object.values(cart);
            
            if (cartArray.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">Your cart is empty.</p>';
                totalEl.innerText = '₹0';
                btn.innerText = 'Place Order (₹0)';
                btn.disabled = true;
                return;
            }

            let total = 0;
            container.innerHTML = cartArray.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-title">${item.name}</div>
                            <div style="color: var(--primary); font-size: 0.85rem;">₹${item.price}</div>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');

            totalEl.innerText = `₹${total}`;
            btn.innerText = `Place Order (₹${total})`;
            btn.disabled = false;
        }

        // 6. Business Logic & Checkout
        function handleOrderTypeChange() {
            const isTakeaway = document.getElementById('takeaway').checked;
            const cashRadio = document.getElementById('pay-cash');
            const onlineRadio = document.getElementById('pay-online');
            const tableDisplay = document.getElementById('table-display');

            if (isTakeaway) {
                // Rule: Takeaway disables Cash payment
                cashRadio.disabled = true;
                onlineRadio.checked = true; // Force online payment
                tableDisplay.style.display = 'none';
            } else {
                // Dine-In
                cashRadio.disabled = false;
                tableDisplay.style.display = 'block';
            }
        }

        function placeOrder() {
            // Get selected options
            const orderType = document.querySelector('input[name="orderType"]:checked').value;
            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
            const total = document.getElementById('cart-total').innerText;

            // Hide Main App, Show Success Screen
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');

            // Populate Success Screen data
            document.getElementById('receipt-type').innerText = orderType;
            document.getElementById('receipt-total').innerText = total;

            const statusBadge = document.getElementById('live-status');
            if (paymentMethod === 'Online') {
                statusBadge.innerText = 'Status: Paid & Preparing';
                statusBadge.style.color = 'white';
                statusBadge.style.background = 'var(--success)';
            } else {
                statusBadge.innerText = 'Status: Unpaid (Cash) & In Queue';
                statusBadge.style.color = '#856404';
                statusBadge.style.background = '#fff3cd';
            }
            
            // Scroll to top
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
