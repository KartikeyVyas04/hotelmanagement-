<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Shivam Ka Dhaba - Menu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --primary: #d9480f; 
            --primary-hover: #b03808;
            --primary-light: #fff0e6;
            --secondary: #f59f00;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #f1f5f9;
            --veg: #16a34a;
            --nonveg: #dc2626;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
            --radius: 20px; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-dark); padding-bottom: 120px; overflow-x: hidden; }
        button { cursor: pointer; border: none; background: none; outline: none; transition: all 0.2s; }
        .hidden { display: none !important; }

        /* --- HEADER --- */
        header { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; padding: 15px 20px; box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .brand-info { display: flex; flex-direction: column; }
        .brand h1 { font-size: 1.3rem; color: var(--primary); font-weight: 700; display: flex; align-items: center; gap: 8px; letter-spacing: -0.5px; }
        .location { font-size: 0.75rem; color: var(--text-muted); margin-left: 28px; font-weight: 500; }
        .table-badge { background: var(--primary-light); color: var(--primary); padding: 6px 14px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; border: 1px solid rgba(217, 72, 15, 0.2); }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }

        /* --- HERO SECTION (Swipeable) --- */
        .hero-section { margin-bottom: 25px; }
        .hero-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: var(--text-dark); padding-left: 5px; }
        .hero-carousel { display: flex; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; padding-bottom: 10px; }
        .hero-carousel::-webkit-scrollbar { display: none; }
        
        .hero-card { min-width: 280px; height: 160px; border-radius: 20px; overflow: hidden; position: relative; scroll-snap-align: start; box-shadow: var(--shadow-md); cursor: pointer; }
        .hero-card img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; }
        .hero-name { color: white; font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
        .hero-price-row { display: flex; justify-content: space-between; align-items: center; }
        .hero-price { color: var(--secondary); font-weight: 700; font-size: 1.1rem; }
        .hero-add { background: var(--primary); color: white; padding: 6px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }

        /* --- SEARCH & FILTERS --- */
        .search-bar { display: flex; align-items: center; background: var(--card-bg); padding: 14px 18px; border-radius: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: all 0.3s; margin-bottom: 15px; }
        .search-bar i { color: var(--text-muted); font-size: 1.3rem; margin-right: 12px; }
        .search-bar input { border: none; outline: none; width: 100%; font-size: 1rem; color: var(--text-dark); background: transparent; }
        
        .sticky-nav { position: sticky; top: 65px; background: var(--bg-color); z-index: 40; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; margin: -10px 0 10px 0; }
        .filters { display: flex; align-items: center; overflow-x: auto; scrollbar-width: none; gap: 10px; width: 100%; padding-right: 10px; }
        .filters::-webkit-scrollbar { display: none; }
        .category-tabs { display: flex; gap: 8px; }
        .tab-btn { background: white; border: 1px solid transparent; padding: 8px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: 500; white-space: nowrap; transition: 0.3s; color: var(--text-muted); box-shadow: var(--shadow-sm); }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(217, 72, 15, 0.25); font-weight: 600; }
        
        .diet-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; background: white; padding: 8px 14px; border-radius: 30px; border: 1px solid var(--border); flex-shrink: 0; box-shadow: var(--shadow-sm); }
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--veg); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* --- MENU GRID --- */
        .section-title { font-size: 1.2rem; margin-bottom: 15px; font-weight: 700; color: var(--text-dark); padding-left: 5px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 15px; margin-bottom: 40px; }
        @media(min-width: 600px) { .menu-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); } }
        
        .menu-card { background: var(--card-bg); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: flex; gap: 15px; position: relative; }
        .item-image { width: 105px; height: 105px; border-radius: 14px; flex-shrink: 0; overflow: hidden; background: #f1f5f9; }
        .item-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .item-details { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; padding-right: 2px; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-title { font-weight: 600; font-size: 1rem; line-height: 1.3; color: var(--text-dark); margin-right: 8px; }
        .diet-icon { font-size: 0.85rem; margin-top: 3px; }
        .veg-icon { color: var(--veg); }
        .nonveg-icon { color: var(--nonveg); }
        .item-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .item-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .price { font-weight: 700; color: var(--text-dark); font-size: 1.1rem; }
        .add-btn { background: var(--primary-light); color: var(--primary); border: 1px solid rgba(217, 72, 15, 0.2); padding: 8px 20px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; }
        .add-btn:active { background: var(--primary); color: white; transform: scale(0.92); }

        /* --- FLOATING CART --- */
        .floating-cart { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 450px; background: var(--primary); color: white; border-radius: 20px; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 12px 30px rgba(217, 72, 15, 0.4); z-index: 90; transition: all 0.4s; }
        .floating-cart.hidden { transform: translate(-50%, 150%); }
        .cart-summary { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1rem; }
        .cart-summary-text { display: flex; flex-direction: column; align-items: flex-start; }
        .cart-summary i { font-size: 1.8rem; }
        .float-total { font-size: 0.8rem; opacity: 0.9; font-weight: 500; }

        /* --- CART DRAWER (Full height on mobile) --- */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); z-index: 99; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(2px); }
        .cart-overlay.active { opacity: 1; visibility: visible; }
        
        .cart-drawer { position: fixed; right: -100%; top: 0; bottom: 0; width: 100%; max-width: 450px; background: var(--bg-color); z-index: 100; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .cart-drawer.active { right: 0; }
        
        .drawer-header { padding: 20px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm); z-index: 2; }
        .drawer-header h2 { font-size: 1.2rem; font-weight: 700; }
        .close-drawer { font-size: 2rem; color: var(--text-dark); margin-right: -5px; }
        
        .drawer-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .cart-items-list { display: flex; flex-direction: column; gap: 10px; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 16px; border-radius: 16px; border: 1px solid var(--border); }
        .cart-item-info h4 { font-size: 0.9rem; margin-bottom: 2px; font-weight: 600; }
        .qty-controls { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 4px; border-radius: 30px; border: 1px solid var(--border); }
        .qty-btn { width: 28px; height: 28px; background: white; border-radius: 50%; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 600; color: var(--primary); }
        
        /* User Details & Checkout Box */
        .user-details-card { background: white; padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
        .section-label { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 0.5px; }
        .custom-input { width: 100%; border: 1px solid var(--border); padding: 12px 15px; border-radius: 12px; font-size: 0.95rem; background: #f8fafc; margin-bottom: 10px; outline: none; transition: 0.2s; }
        .custom-input:focus { border-color: var(--primary); background: white; }
        
        .checkout-box { background: white; padding: 20px; border-top: 1px solid var(--border); box-shadow: 0 -10px 20px rgba(0,0,0,0.04); z-index: 2; }
        .radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .radio-label { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 2px solid var(--border); border-radius: 16px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: 0.2s; color: var(--text-muted); background: white; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-label { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
        input[type="radio"]:disabled + .radio-label { opacity: 0.4; cursor: not-allowed; background: #f8fafc; }

        .total-row { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; color: var(--text-dark); align-items: center; }
        .place-order-btn { width: 100%; background: var(--primary); color: white; padding: 16px; border-radius: 20px; font-size: 1.1rem; font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 8px 20px rgba(217, 72, 15, 0.3); transition: 0.2s; }
        .place-order-btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; color: #94a3b8; }

        /* --- SUCCESS --- */
        .success-screen { min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .check-circle { font-size: 6rem; color: var(--veg); margin-bottom: 10px; }
        .receipt-card { background: white; padding: 25px; border-radius: 24px; box-shadow: var(--shadow-md); width: 100%; max-width: 400px; margin-top: 25px; text-align: left; border: 1px solid var(--border); }
        .receipt-card p { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1rem; border-bottom: 1px dashed var(--border); padding-bottom: 10px; color: var(--text-dark); font-weight: 500; }
        
    </style>
</head>
<body>

    <header>
        <div class="brand-info">
            <div class="brand">
                <i class='bx bx-restaurant'></i>
                <h1 id="brand-name">Loading...</h1>
            </div>
            <span class="location">Pimpri-Chinchwad</span>
        </div>
        <div class="table-badge hidden" id="table-display">Table --</div>
    </header>

    <div class="container" id="main-app">
        
        <div class="search-bar">
            <i class='bx bx-search'></i>
            <input type="text" id="search-input" placeholder="Search for dishes..." onkeyup="filterMenu()">
        </div>

        <div class="hero-section" id="hero-section">
            <h2 class="hero-title">Today's Specials 🔥</h2>
            <div class="hero-carousel" id="hero-carousel">
                </div>
        </div>
        
        <div class="sticky-nav">
            <div class="filters">
                <div class="category-tabs" id="category-tabs"></div>
                <div class="diet-toggle">
                    <span>Veg</span>
                    <label class="switch">
                        <input type="checkbox" id="veg-toggle" onchange="filterMenu()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <h2 class="section-title" id="current-category-title">All Items</h2>
        <div class="menu-grid" id="menu-container"></div>

    </div>

    <button class="floating-cart hidden" id="floating-cart" onclick="toggleCart()">
        <div class="cart-summary">
            <i class='bx bx-shopping-bag'></i>
            <div class="cart-summary-text">
                <span id="float-qty">0 Items</span>
                <span class="float-total" id="float-subtotal">₹0</span>
            </div>
        </div>
        <div style="font-weight: 700; font-size: 1.1rem; display: flex; align-items: center;">
            Checkout <i class='bx bx-chevron-right' style="font-size: 1.5rem; margin-top: 2px;"></i>
        </div>
    </button>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <aside class="cart-drawer" id="cart-drawer">
        <div class="drawer-header">
            <h2>Your Order</h2>
            <button class="close-drawer" onclick="toggleCart()"><i class='bx bx-x'></i></button>
        </div>
        
        <div class="drawer-content">
            <div class="cart-items-list" id="cart-items"></div>

            <div class="user-details-card">
                <span class="section-label">Contact Details</span>
                <input type="text" id="customer-name" class="custom-input" placeholder="Your Name" autocomplete="name">
                <input type="tel" id="customer-phone" class="custom-input" placeholder="Phone Number" autocomplete="tel">
            </div>
        </div>

        <div class="checkout-box">
            <span class="section-label">Order Type</span>
            <div class="radio-grid" id="order-type-container">
                <div>
                    <input type="radio" name="orderType" id="dine-in" value="Dine-In" checked onchange="handleCheckoutRules()">
                    <label for="dine-in" class="radio-label"><i class='bx bx-restaurant'></i> Dine-In</label>
                </div>
                <div>
                    <input type="radio" name="orderType" id="takeaway" value="Takeaway" onchange="handleCheckoutRules()">
                    <label for="takeaway" class="radio-label"><i class='bx bx-shopping-bag'></i> Takeaway</label>
                </div>
            </div>

            <span class="section-label">Payment Method</span>
            <div class="radio-grid">
                <div>
                    <input type="radio" name="payMethod" id="pay-upi" value="UPI" checked>
                    <label for="pay-upi" class="radio-label"><i class='bx bx-qr-scan'></i> Pay Online</label>
                </div>
                <div>
                    <input type="radio" name="payMethod" id="pay-cash" value="Cash">
                    <label for="pay-cash" class="radio-label"><i class='bx bx-money'></i> Pay Cash</label>
                </div>
            </div>

            <div class="total-row">
                <span>Total</span>
                <span id="drawer-total" style="color: var(--primary); font-size: 1.4rem;">₹0</span>
            </div>
            <div id="error-msg" style="color: var(--nonveg); font-size: 0.8rem; text-align: center; margin-bottom: 10px; display: none;">Please enter Name and Phone to continue.</div>
            
            <button class="place-order-btn" id="checkout-btn" onclick="validateAndPlaceOrder()">
                Place Order
            </button>
        </div>
    </aside>

    <div class="container hidden" id="success-screen">
        <div class="success-screen">
            <i class='bx bxs-check-circle check-circle'></i>
            <h1 style="color: var(--text-dark); font-size: 2rem;">Order Sent!</h1>
            <p style="color: var(--text-muted); margin-top: 10px; font-size: 1rem;">The kitchen has received your order, <span id="success-name"></span>.</p>
            
            <div class="receipt-card">
                <h3 style="margin-bottom: 18px; border-bottom: 2px solid var(--border); padding-bottom: 12px; color: var(--primary);">Order #SKD-8891</h3>
                <p><strong>Type:</strong> <span id="receipt-type"></span></p>
                <p><strong>Table No:</strong> <span id="receipt-table"></span></p>
                <p><strong>Payment:</strong> <span id="receipt-pay"></span></p>
                <p style="border:none; margin-top: 20px; font-size: 1.3rem;"><strong>Total:</strong> <strong style="color: var(--primary);" id="receipt-total"></strong></p>
            </div>

            <button onclick="location.reload()" style="margin-top: 35px; background: white; border: 2px solid var(--border); padding: 14px 30px; border-radius: 30px; font-weight: 600; width: 100%;">Start New Order</button>
        </div>
    </div>

    <script>
        const config = {
            restaurantName: "Shivam Ka Dhaba",
            currencySymbol: "₹"
        };

        // Added 'isHero' to highlight top items
        const menuData = [
            { id: 1, name: 'Punjabi Butter Chicken', category: 'Mains', price: 350, diet: 'nonveg', isHero: true, desc: 'Tender chicken simmered in a rich, creamy tomato and cashew gravy.', image: 'https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?auto=format&fit=crop&w=400&q=80' },
            { id: 2, name: 'Paneer Butter Masala', category: 'Mains', price: 280, diet: 'veg', isHero: true, desc: 'Soft cottage cheese cubes cooked in a spiced tomato gravy.', image: 'https://images.unsplash.com/photo-1631452180519-c014fe946bc0?auto=format&fit=crop&w=400&q=80' },
            { id: 3, name: 'Dal Makhani', category: 'Mains', price: 220, diet: 'veg', isHero: false, desc: 'Whole black lentils slow-cooked overnight with butter and cream.', image: 'https://images.unsplash.com/photo-1546833999-b9f581a1996d?auto=format&fit=crop&w=400&q=80' },
            { id: 4, name: 'Garlic Naan', category: 'Breads', price: 60, diet: 'veg', isHero: false, desc: 'Freshly baked flatbread from the tandoor, topped with garlic.', image: 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&w=400&q=80' },
            { id: 5, name: 'Chicken Tikka Dry', category: 'Starters', price: 320, diet: 'nonveg', isHero: true, desc: 'Boneless chicken chunks marinated in spiced yogurt and roasted.', image: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?auto=format&fit=crop&w=400&q=80' },
            { id: 6, name: 'Hot Gulab Jamun (2 pcs)', category: 'Desserts', price: 90, diet: 'veg', isHero: false, desc: 'Soft milk-solid dumplings deep-fried and soaked in sugar syrup.', image: 'https://images.unsplash.com/photo-1593006526971-1188d44e5916?auto=format&fit=crop&w=400&q=80' },
            { id: 7, name: 'Kulhad Masala Chai', category: 'Beverages', price: 40, diet: 'veg', isHero: false, desc: 'Strong Indian tea brewed with crushed ginger, cardamom.', image: 'https://images.unsplash.com/photo-1576092762791-dd9e2220abd1?auto=format&fit=crop&w=400&q=80' }
        ];

        let cart = {};
        let activeCategory = 'All';
        const categories = ['All', 'Starters', 'Mains', 'Breads', 'Desserts', 'Beverages'];
        let activeTableNumber = null;

        window.onload = () => {
            document.getElementById('page-title').innerText = `${config.restaurantName} - Menu`;
            document.getElementById('brand-name').innerText = config.restaurantName;
            
            handleQRLogic();
            loadUserData();
            renderHero();
            renderTabs();
            filterMenu();
        };

        // --- NEW: QR CODE URL PARSING ---
        function handleQRLogic() {
            const urlParams = new URLSearchParams(window.location.search);
            const tableParam = urlParams.get('table');
            const tableBadge = document.getElementById('table-display');
            const dineInRadio = document.getElementById('dine-in');
            const takeawayRadio = document.getElementById('takeaway');

            if (tableParam) {
                // Customer scanned a table QR code
                activeTableNumber = tableParam;
                tableBadge.innerText = `Table ${tableParam}`;
                tableBadge.classList.remove('hidden');
                
                // Force Dine-In, disable Takeaway
                dineInRadio.checked = true;
                takeawayRadio.disabled = true;
            } else {
                // Direct website visit (Takeaway default)
                tableBadge.classList.add('hidden');
                takeawayRadio.checked = true;
                handleCheckoutRules(); // Will disable cash
            }
        }

        // --- NEW: USER DATA PERSISTENCE ---
        function loadUserData() {
            const savedUser = localStorage.getItem('skd_user_profile');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('customer-name').value = user.name;
                document.getElementById('customer-phone').value = user.phone;
            }
        }

        function saveUserData() {
            const name = document.getElementById('customer-name').value.trim();
            const phone = document.getElementById('customer-phone').value.trim();
            if(name && phone) {
                localStorage.setItem('skd_user_profile', JSON.stringify({ name, phone }));
            }
        }

        // --- RENDER LOGIC ---
        function renderHero() {
            const container = document.getElementById('hero-carousel');
            const heroes = menuData.filter(item => item.isHero);
            
            container.innerHTML = heroes.map(item => `
                <div class="hero-card" onclick="addToCart(${item.id})">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="hero-overlay">
                        <span class="hero-name">${item.name}</span>
                        <div class="hero-price-row">
                            <span class="hero-price">${config.currencySymbol}${item.price}</span>
                            <span class="hero-add">Add +</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderTabs() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = categories.map(cat => `
                <button class="tab-btn ${cat === activeCategory ? 'active' : ''}" onclick="switchCategory('${cat}')">${cat}</button>
            `).join('');
        }

        function switchCategory(category) {
            activeCategory = category;
            document.getElementById('current-category-title').innerText = category === 'All' ? 'All Items' : category;
            renderTabs();
            filterMenu();
        }

        function filterMenu() {
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const vegOnly = document.getElementById('veg-toggle').checked;
            
            const filtered = menuData.filter(item => {
                const matchCategory = activeCategory === 'All' || item.category === activeCategory;
                const matchSearch = item.name.toLowerCase().includes(searchQuery) || item.desc.toLowerCase().includes(searchQuery);
                const matchDiet = vegOnly ? item.diet === 'veg' : true;
                return matchCategory && matchSearch && matchDiet;
            });

            const container = document.getElementById('menu-container');
            if (filtered.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px 20px; color: var(--text-muted);"><i class='bx bx-search' style='font-size: 2rem; opacity: 0.3;'></i><p>No dishes found.</p></div>`;
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="menu-card">
                    <div class="item-image"><img src="${item.image}" loading="lazy"></div>
                    <div class="item-details">
                        <div>
                            <div class="item-header">
                                <h3 class="item-title">${item.name}</h3>
                                <i class='bx bx-stop-circle diet-icon ${item.diet === 'veg' ? 'veg-icon' : 'nonveg-icon'}'></i>
                            </div>
                            <p class="item-desc">${item.desc}</p>
                        </div>
                        <div class="item-footer">
                            <span class="price">${config.currencySymbol}${item.price}</span>
                            <button class="add-btn" onclick="addToCart(${item.id})">Add <i class='bx bx-plus'></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- CART LOGIC ---
        function addToCart(itemId) {
            if (cart[itemId]) { cart[itemId].qty += 1; } 
            else {
                const item = menuData.find(i => i.id === itemId);
                cart[itemId] = { ...item, qty: 1 };
            }
            updateCartData();
        }

        function updateQty(itemId, change) {
            if (cart[itemId]) {
                cart[itemId].qty += change;
                if (cart[itemId].qty <= 0) delete cart[itemId];
                updateCartData();
            }
        }

        function updateCartData() {
            const cartArray = Object.values(cart);
            let totalQty = 0; let totalPrice = 0;
            const container = document.getElementById('cart-items');
            
            if (cartArray.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color:#94a3b8;">Your cart is empty.</div>';
                document.getElementById('floating-cart').classList.add('hidden');
                document.getElementById('drawer-total').innerText = `${config.currencySymbol}0`;
                return;
            }

            container.innerHTML = cartArray.map(item => {
                totalQty += item.qty; totalPrice += (item.price * item.qty);
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4><i class='bx bx-stop-circle ${item.diet === 'veg' ? 'veg-icon' : 'nonveg-icon'}' style="font-size:0.85rem"></i> ${item.name}</h4>
                            <span style="color: var(--primary); font-weight: 700;">${config.currencySymbol}${item.price * item.qty}</span>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            <span style="font-weight: 700; width: 20px; text-align: center;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('float-qty').innerText = `${totalQty} Item${totalQty > 1 ? 's' : ''}`;
            document.getElementById('float-subtotal').innerText = `${config.currencySymbol}${totalPrice}`;
            document.getElementById('drawer-total').innerText = `${config.currencySymbol}${totalPrice}`;
            document.getElementById('floating-cart').classList.remove('hidden');
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            document.getElementById('cart-overlay').classList.toggle('active');
            document.body.style.overflow = document.getElementById('cart-drawer').classList.contains('active') ? 'hidden' : 'auto';
        }

        function handleCheckoutRules() {
            const isTakeaway = document.getElementById('takeaway').checked;
            const cashRadio = document.getElementById('pay-cash');
            const upiRadio = document.getElementById('pay-upi');
            
            if (isTakeaway) {
                cashRadio.disabled = true;
                upiRadio.checked = true;
            } else {
                cashRadio.disabled = false;
            }
        }

        // --- NEW: VALIDATION & PLACE ORDER ---
        function validateAndPlaceOrder() {
            const name = document.getElementById('customer-name').value.trim();
            const phone = document.getElementById('customer-phone').value.trim();
            const errorMsg = document.getElementById('error-msg');

            // Form Validation
            if (!name || !phone || phone.length < 10) {
                errorMsg.style.display = 'block';
                return;
            }
            errorMsg.style.display = 'none';

            // Save details for next time
            saveUserData();

            const orderType = document.querySelector('input[name="orderType"]:checked').value;
            const payMethod = document.querySelector('input[name="payMethod"]:checked').value;
            const total = document.getElementById('drawer-total').innerText;

            // Transition UI
            toggleCart();
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('floating-cart').classList.add('hidden');
            document.querySelector('header').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');

            // Populate Final Screen
            document.getElementById('success-name').innerText = name.split(' ')[0]; // First name
            document.getElementById('receipt-type').innerText = orderType;
            document.getElementById('receipt-table').innerText = activeTableNumber ? activeTableNumber : 'N/A';
            document.getElementById('receipt-pay').innerText = payMethod === 'UPI' ? 'Paid Online' : 'Pay at Counter';
            document.getElementById('receipt-total').innerText = total;
            
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
